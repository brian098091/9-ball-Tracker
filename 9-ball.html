<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>9-ball</title>
<style>
  .flex-container {
    flex-direction: column;
    align-items: center;
  }

  .video-container {
    display: none;
    align-items: center;
    justify-content: start;
    margin-bottom: 20px;
  }

  .content-container {
    display: flex;
    flex-direction: row;
    align-items: start;
  }

  #colorInfo {
    display: none;
    margin-left: 20px;
    margin-top: 20px;
  }
  
  #rgbValue {
    display: block;
    margin-bottom: 10px;
  }
  
  #selectedColor {
    width: 50px;
    height: 50px;
    border: 1px solid #000;
    margin-bottom: 10px;
  }
  
  #confirmColorBtn {
    display: block;
    margin-top: 10px;
    width: 150px;
    height: 45px;
    font-size: 20px;
  }
  
  #getFrameBtn {
    margin-left: 20px;
    width: 150px;
    height: 45px;
    font-size: 20px;
  }

  #coordinates {
    display: block;
    margin-bottom: 5px;
  }

  #confirmMaskBtn {
    margin-top: 20px;
    margin-left: 20px;
    width: 150px;
    height: 45px;
    font-size: 20px;
  }

  .image-selection-container {
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 10px;
  }

  .image-option {
    display: flex;
    align-items: center;
    margin-left: 50px;
  }

  .image-option img {
    width: 300px;
    height: 50px;
    border: 2px solid transparent;
  }

  .image-option input[type="radio"] {
    margin-right: 10px;
  }

  .mask-container {
    display: flex;
    position: relative;
  }

  .mask-image {
    max-width: 70%;
  }
</style>
</head>
<body>
<div class="flex-container">
  <div>
    <input type="text" id="youtubeUrl" placeholder="Enter YouTube URL">
    <div>
      <label for="startTime">Start Time (seconds):</label>
      <input type="number" id="startTime" min="0" placeholder="Optional">
    </div>
    <div>
      <label for="endTime">End Time (seconds):</label>
      <input type="number" id="endTime" min="0" placeholder="Optional">
    </div>
    <button id="downloadBtn">Download Video</button>
  </div>
  <div>
    <input type="file" id="videoUploader" accept="video/*">
  </div>
  <div class="video-container">
    <video id="videoPlayer" controls width="640"></video>
    <button id="getFrameBtn">決定frame</button>
  </div>
  <div class="content-container">
    <canvas id="frameCanvas"></canvas>
    <div id="colorInfo">
      <p>目前選擇的點座標: <span id="coordinates">X: 0, Y: 0</span></p>
      <p>目前選擇的桌子顏色:
      <span id="rValue">R: 0</span>
      <span id="gValue">G: 0</span>
      <span id="bValue">B: 0</span>
      </p>
      <div id="selectedColor"></div>
      
      <div id="HSVControls">
        <label for="gap1">H (0-50):</label>
        <input type="range" id="gap1" name="gap1" min="0" max="50" value="10" oninput="this.nextElementSibling.value = this.value">
        <output>10</output><br>
      
        <label for="gap2">S (0-50):</label>
        <input type="range" id="gap2" name="gap2" min="0" max="50" value="15" oninput="this.nextElementSibling.value = this.value">
        <output>15</output><br>
      
        <label for="gap3">V (0-50):</label>
        <input type="range" id="gap3" name="gap3" min="0" max="50" value="15" oninput="this.nextElementSibling.value = this.value">
        <output>15</output><br>
        <button id="confirmColorBtn">確定桌子顏色</button>
      </div>
    </div>
  </div>
  <div id="maskContainer" class="mask-container" style="display: none;">
    <img id="maskImage" class="mask-image" src="" alt="Mask Image">
    <div class="image-selection-container">
      <h3>請選擇球組顏色</h3>
      <div id="imageSelection">
        <label class="image-option">
          <input type="radio" name="imageOption" value="1" checked>
          <img src="./balls/9-balls.jpg" alt="Image 1">
        </label>
        <label class="image-option">
          <input type="radio" name="imageOption" value="2">
          <img src="./balls2/9-balls.jpg" alt="Image 2">
        </label>
      </div>
      <button id="confirmMaskBtn">確定mask</button>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
